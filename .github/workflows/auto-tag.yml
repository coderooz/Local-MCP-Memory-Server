name: Auto Tag on Version Change

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode of operation'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - dry-run
          - force
      version:
        description: 'Specific version to tag (optional, defaults to package.json)'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  check-and-tag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version info
        id: version_info
        run: |
          echo "=== Version Check ==="
          
          # Determine version to use
          if [[ "${{ inputs.version }}" != "" ]]; then
            NEW_VERSION="${{ inputs.version }}"
            echo "Using explicitly provided version: $NEW_VERSION"
          else
            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "Using package.json version: $NEW_VERSION"
          fi
          
          # Validate version format (semver)
          if [[ ! "$NEW_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $NEW_VERSION"
            echo "Must be semantic version (e.g., 1.2.3)"
            exit 1
          fi
          
          TAG_NAME="v$NEW_VERSION"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "is_dry_run=${{ inputs.mode == 'dry-run' }}" >> $GITHUB_OUTPUT
          echo "is_force=${{ inputs.mode == 'force' }}" >> $GITHUB_OUTPUT
          echo "::notice::Target tag: $TAG_NAME"

      - name: Check existing tag
        id: tag_check
        run: |
          TAG_NAME="${{ steps.version_info.outputs.tag_name }}"
          
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "tag_exists=true" >> $GITHUB_OUTPUT
            echo "tag_commit=$(git rev-parse "$TAG_NAME")" >> $GITHUB_OUTPUT
            
            # Get current commit for comparison
            CURRENT_COMMIT=$(git rev-parse HEAD)
            if [[ "$TAG_NAME" == "$(git tag --points-at HEAD)" ]]; then
              echo "tag_on_current_commit=true" >> $GITHUB_OUTPUT
              echo "::notice::Tag $TAG_NAME already exists and points to current commit"
            else
              echo "tag_on_current_commit=false" >> $GITHUB_OUTPUT
              echo "::warning::Tag $TAG_NAME exists but points to different commit"
            fi
          else
            echo "tag_exists=false" >> $GITHUB_OUTPUT
            echo "::notice::Tag $TAG_NAME does not exist"
          fi

      - name: Dry-run summary
        if: steps.version_info.outputs.is_dry_run == 'true'
        run: |
          echo ""
          echo "=== DRY RUN MODE ==="
          echo "Version: ${{ steps.version_info.outputs.version }}"
          echo "Tag: ${{ steps.tag_check.outputs.tag_name }}"
          echo "Tag exists: ${{ steps.tag_check.outputs.tag_exists }}"
          echo "Would create: ${{ steps.tag_check.outputs.tag_exists == 'false' }}"
          echo ""
          echo "No changes were made (dry-run mode)"

      - name: Create tag (auto mode)
        if: inputs.mode == 'auto'
        run: |
          TAG_NAME="${{ steps.tag_check.outputs.tag_name }}"
          
          if [[ "${{ steps.tag_check.outputs.tag_exists }}" == "true" ]]; then
            echo "::notice::Skipping - tag $TAG_NAME already exists"
            echo "::set-output name=created::false"
            echo "SKIP_REASON=tag_exists"
          else
            echo "Creating tag $TAG_NAME..."
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
            git push origin "$TAG_NAME"
            echo "::notice::Successfully created and pushed tag $TAG_NAME"
            echo "::set-output name=created::true"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tag (force mode)
        if: inputs.mode == 'force'
        run: |
          TAG_NAME="${{ steps.tag_check.outputs.tag_name }}"
          
          echo "Force creating/updating tag $TAG_NAME..."
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Delete existing tag if it exists
          if [[ "${{ steps.tag_check.outputs.tag_exists }}" == "true" ]]; then
            echo "Removing existing tag..."
            git push --delete origin "$TAG_NAME" || true
            git tag -d "$TAG_NAME" || true
          fi
          
          # Create new tag
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          git push origin "$TAG_NAME" --force
          echo "::notice::Successfully force-updated tag $TAG_NAME"

      - name: Summary
        run: |
          echo ""
          echo "=== SUMMARY ==="
          echo "Version: ${{ steps.version_info.outputs.version }}"
          echo "Tag: ${{ steps.tag_check.outputs.tag_name }}"
          echo "Mode: ${{ inputs.mode }}"
          
          if [[ "${{ inputs.mode }}" == "dry-run" ]]; then
            echo "Status: Preview only (no changes made)"
          elif [[ "${{ inputs.mode }}" == "auto" ]]; then
            if [[ "${{ steps.tag_check.outputs.tag_exists }}" == "true" ]]; then
              echo "Status: Skipped (tag already exists)"
            else
              echo "Status: Created successfully"
            fi
          else
            echo "Status: Force-updated"
          fi
